<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Luas Segitiga</title>
</head>
<body>

    <form action="#">
        <input type="number" id="alas" placeholder="Alas Segitiga">
        <br>
        <input type="number" id="tinggi" placeholder="Tinggi Segitiga">
        <br>
        <button id="submit" onclick="hitung()">Hitung Luas</button>
    </form>
    
    <p id="hasil"></p>

    <script>
        // Pure Function untuk menghitung luas segitiga
        function triangle(a, b) {
            return a * b / 2;
        }

        // Fungsi utama untuk menangani event klik tombol
        function hitung() {
            var alas = parseInt(document.getElementById("alas").value);
            var tinggi = parseInt(document.getElementById("tinggi").value);
            
            // Menampilkan hasil perhitungan ke elemen paragraf
            document.getElementById("hasil").innerHTML = triangle(alas, tinggi);
        }
    </script>

</body>
</html>
