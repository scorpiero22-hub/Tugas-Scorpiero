<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

    <h2>Silahkan Isikan Data</h2>

    <form action="login.html">
        <table>

            <tr>
                <td>
                    <label for="fname">First name</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="fname" value="Aura">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="mname">Middle name</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="mname" value="-">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="lname">Last name</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="lname" value="Ramadani">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="date">Tanggal Lahir</label>
                </td>
                <td>:</td>
                <td>
                    <input type="date" id="date">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="lname">Jenis Kelamin</label>
                </td>
                <td>:</td>
                <td>
                    <input type="radio" id="pria" name="gender" value="Pria">
                    <label for="pria">Pria</label><br>

                    <input type="radio" id="wanita" name="gender" value="Wanita">
                    <label for="wanita">Wanita</label><br>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="alamat">Tempat Tinggal</label>
                </td>
                <td>:</td>
                <td>
                    <input list="browsers" name="browser">

                    <datalist id="browsers">
                        <option value="Tanjung Morawa">
                        <option value="Medan">
                        <option value="Sunggal">
                        <option value="Pakam">
                        <option value="Helvet">
                        <option value="Johor">
                    </datalist>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="email">Email</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="email" value="example@mail.com">
                </td>
            </tr>

            <tr>
                <td colspan="3">
                    <input type="submit" value="Register">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
